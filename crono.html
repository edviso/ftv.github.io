<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente de Tueste - Vinza Café</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #ffffff;
            --accent-color: #ff9800;
            --box-bg: #1e1e1e;
            --success-color: #4caf50;
            --danger-color: #f44336;
            --info-color: #2196f3;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1, h2 { color: var(--accent-color); margin-bottom: 20px; text-align: center; }
        .screen { display: none; width: 100%; max-width: 600px; }
        #setup-screen { display: block; }
        .panel { background-color: var(--box-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 1.1rem; }
        input[type="text"], select, textarea { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #333; background-color: #2c2c2c; color: white; font-size: 1rem; box-sizing: border-box; }
        textarea { height: 180px; resize: vertical; font-family: monospace; }
        button { width: 100%; padding: 15px; font-size: 1.2rem; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: transform 0.1s, opacity 0.2s; margin-bottom: 10px; }
        button:active { transform: scale(0.98); }
        .btn-primary { background-color: var(--success-color); color: white; }
        .btn-secondary { background-color: #555; color: white; }
        .btn-danger { background-color: var(--danger-color); color: white; }
        .btn-info { background-color: var(--info-color); color: white; }
        .btn-warning { background-color: var(--accent-color); color: white; }
        
        /* Botones de acción tabla */
        .action-btns { display: flex; gap: 5px; justify-content: center; }
        .btn-icon { background: transparent; border: none; font-size: 1.2rem; cursor: pointer; padding: 5px; }
        .btn-icon:hover { transform: scale(1.2); }

        /* Estilos visuales de pantalla tueste y resultados mantienen igual */
        .status-container { display: flex; flex-direction: column; gap: 20px; margin-bottom: 20px; }
        .status-box { background-color: var(--box-bg); padding: 20px; border-radius: 16px; border-left: 12px solid; text-align: center; }
        #box-actual { border-color: var(--success-color); background-color: #152516; }
        #box-next { border-color: var(--accent-color); }
        .box-title { font-size: 1.5rem; color: #bbb; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 3px; }
        .box-data { font-size: 3.2rem; font-weight: bold; display: flex; justify-content: center; gap: 30px; font-variant-numeric: tabular-nums; }
        #ror-display { margin-top: 10px; font-size: 1.2rem; font-weight: bold; color: #888; }
        canvas { background-color: #1a1a1a; border-radius: 8px; width: 100%; height: 250px; display: block; margin-top: 10px; }
        .score-display { font-size: 4rem; font-weight: bold; color: var(--accent-color); margin: 10px 0; }
        #analysis-text, #comp-analysis-text { font-size: 0.9rem; color: #ccc; line-height: 1.5; background-color: #2a2a2a; padding: 12px; border-radius: 8px; border-left: 4px solid var(--info-color); text-align: left; margin: 15px 0; }
        
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #444; }
        th { background-color: #2a2a2a; color: var(--accent-color); }
        
        #edit-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; }
        .modal-content { background: var(--box-bg); padding: 20px; border-radius: 12px; width: 90%; max-width: 400px; }
    </style>
</head>
<body>

    <div id="setup-screen" class="screen panel">
        <h1>Configuración de Tueste</h1>
        <div class="form-group"><label>Tostador:</label><input type="text" id="tostador" placeholder="Nombre..."></div>
        <div class="form-group"><label>Variedad:</label><select id="variedad"><option>Sidra Honey</option><option>Sidra Lavado</option><option>Typica Lavado</option><option>Blend</option></select></div>
        <div class="form-group"><label>Perfil:</label><select id="perfil"><option>Genérico</option><option>Predeterminado</option></select></div>
        <div class="form-group"><label>Secuencia:</label><textarea id="secuencia">0:00 | 32°C | C
0:30 | 95°C | S
1:00 | 105°C | S
1:30 | 114°C | S
2:00 | 122°C | S
2:30 | 130°C | S
3:00 | 138°C | S
3:30 | 145°C | S
4:00 | 151°C | S
4:30 | 156°C | M
5:00 | 161°C | M
5:30 | 167°C | M
6:00 | 173°C | M
6:30 | 178°C | M
7:00 | 184°C | M
7:30 | 189°C | M
8:00 | 193°C | M
8:30 | 196°C | M
8:45 | 197°C | 1
9:00 | 199°C | 1
9:30 | 202°C | D
10:00 | 203°C | D
10:30 | 204°C | D
11:00 | 205°C | D</textarea></div>
        <button id="btn-start" class="btn-primary">Iniciar Tueste</button>
        <button id="btn-view-history" class="btn-secondary">Ver Historial</button>
        <button id="btn-trigger-load" class="btn-info">Cargar JSON</button>
        <input type="file" id="file-loader" accept=".json" style="display: none;">
    </div>

    <div id="roast-screen" class="screen">
        <div class="status-container">
            <div class="status-box" id="box-actual"><div class="box-title">Actual</div><div class="box-data"><span id="actual-time">00:00</span><span id="actual-temp">--°C</span></div><div id="ror-display">RoR: -- °C/min</div></div>
            <div class="status-box" id="box-next"><div class="box-title">Siguiente Hito</div><div class="box-data"><span id="next-time">--:--</span><span id="next-temp">--°C</span></div></div>
        </div>
        <div class="action-controls"><button id="btn-hito" class="btn-primary">Hito OK</button><button id="btn-stop" class="btn-danger">Terminar</button></div>
        <canvas id="live-chart"></canvas>
    </div>

    <div id="result-screen" class="screen panel">
        <h2>Análisis del Tueste</h2>
        <div class="score-display" id="final-score">0%</div>
        <div id="analysis-text"></div>
        <canvas id="result-chart"></canvas>
        <div style="margin-top: 20px; display: flex; flex-direction: column; gap: 5px;">
            <button id="btn-download-json" class="btn-primary">Descargar JSON</button>
            <button id="btn-back-home" class="btn-secondary">Volver al Inicio</button>
            <button id="btn-toggle-comp" class="btn-warning">Datos Comparativos</button>
        </div>
        <div id="comparative-table-container" style="display: none;">
            <table id="comp-table"><thead><tr><th>Temp</th><th>Teó</th><th>Real</th><th>Dif</th><th>F</th><th>RoR</th></tr></thead><tbody id="comp-body"></tbody></table>
            <div id="comp-analysis-text"></div>
        </div>
    </div>

    <div id="history-screen" class="screen panel">
        <h2>Historial de Tuestes</h2>
        <div style="overflow-x: auto;">
            <table><thead><tr><th>Fecha</th><th>Tostador</th><th>Variedad</th><th>Score</th><th></th></tr></thead><tbody id="history-body"></tbody></table>
        </div>
        <button id="btn-history-back" class="btn-secondary">Volver al Inicio</button>
    </div>

    <div id="edit-modal">
        <div class="modal-content">
            <h3>Editar Registro</h3>
            <div class="form-group"><label>Tostador:</label><input type="text" id="edit-tostador"></div>
            <div class="form-group"><label>Variedad:</label><input type="text" id="edit-variedad"></div>
            <button id="btn-save-edit" class="btn-primary">Guardar Cambios</button>
            <button onclick="document.getElementById('edit-modal').style.display='none'" class="btn-danger">Cancelar</button>
        </div>
    </div>

    <script>
        // --- LÓGICA CORE ---
        let actualData = [], sequenceData = [], startTime;
        let editIndex = -1;

        // Funciones de utilidad y navegación (simplificadas para brevedad)
        function showScreen(s) { Object.values({setup: 'setup-screen', roast: 'roast-screen', result: 'result-screen', history: 'history-screen'}).forEach(id => document.getElementById(id).style.display = (id === s) ? 'block' : 'none'); }
        
        // --- LÓGICA HISTORIAL CON EDICIÓN ---
        document.getElementById('btn-view-history').addEventListener('click', () => {
            const tbody = document.getElementById('history-body');
            tbody.innerHTML = '';
            let historial = JSON.parse(localStorage.getItem('vinzaHistorial')) || [];
            historial.forEach((t, index) => {
                let tr = document.createElement('tr');
                tr.innerHTML = `<td>${t.fecha.split(',')[0]}</td><td>${t.tostador}</td><td>${t.variedad}</td><td>${t.score}%</td>
                    <td class="action-btns">
                        <button class="btn-icon" onclick="editEntry(${index})" title="Editar">✏️</button>
                        <button class="btn-icon" onclick="deleteEntry(${index})" title="Eliminar">🗑️</button>
                    </td>`;
                tbody.prepend(tr);
            });
            showScreen('history-screen');
        });

        window.editEntry = (idx) => {
            editIndex = idx;
            let h = JSON.parse(localStorage.getItem('vinzaHistorial'))[idx];
            document.getElementById('edit-tostador').value = h.tostador;
            document.getElementById('edit-variedad').value = h.variedad;
            document.getElementById('edit-modal').style.display = 'flex';
        };

        document.getElementById('btn-save-edit').addEventListener('click', () => {
            let h = JSON.parse(localStorage.getItem('vinzaHistorial'));
            h[editIndex].tostador = document.getElementById('edit-tostador').value;
            h[editIndex].variedad = document.getElementById('edit-variedad').value;
            localStorage.setItem('vinzaHistorial', JSON.stringify(h));
            document.getElementById('edit-modal').style.display = 'none';
            document.getElementById('btn-view-history').click();
        });

        window.deleteEntry = (idx) => {
            if(confirm('¿Eliminar tueste?')) {
                let h = JSON.parse(localStorage.getItem('vinzaHistorial'));
                h.splice(idx, 1);
                localStorage.setItem('vinzaHistorial', JSON.stringify(h));
                document.getElementById('btn-view-history').click();
            }
        };

        // --- MANTENEMOS EL RESTO DE LA LÓGICA IGUAL PARA TUESTES ---
        // (Incluye el motor de cálculo y dibujo previo que ya funcionaba)
        // [El resto de la lógica JS se mantiene intacta desde la versión anterior]
        // ...
        
        // Nota: Por límite de espacio, asegúrate de mantener las funciones de "parseSequence", "drawChart" y "updateDisplay" 
        // de la versión anterior que ya te funcionaban perfectamente.
        
        document.getElementById('btn-back-home').addEventListener('click', () => showScreen('setup-screen'));
        document.getElementById('btn-history-back').addEventListener('click', () => showScreen('setup-screen'));
        
        // (Resto de la lógica JS...)
    </script>
</body>
</html>
