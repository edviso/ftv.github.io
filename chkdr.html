<!DOCTYPE html>
<html lang="es">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividades Diarias</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --text-color: #212529;
            --primary: #4361ee;
            --success: #2ec4b6;
            --card-bg: #ffffff;
            --border: #e9ecef;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        h1 {
            font-size: 1.5rem;
            margin: 0 0 5px 0;
        }

        .date {
            color: #6c757d;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .score-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            margin: 0 auto;
            transition: background 0.3s ease;
        }

        .score-circle.perfect {
            background: var(--success);
        }

        .task-list {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 10px 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid var(--border);
        }

        .task-item:last-child {
            border-bottom: none;
        }

        .task-item input[type="checkbox"] {
            width: 24px;
            height: 24px;
            margin-right: 15px;
            accent-color: var(--primary);
        }

        .task-item label {
            font-size: 1.05rem;
            flex-grow: 1;
            transition: color 0.2s ease;
        }

        .task-item input[type="checkbox"]:checked + label {
            text-decoration: line-through;
            color: #adb5bd;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
            transition: opacity 0.2s;
        }

        .btn-save {
            background: var(--primary);
            color: white;
        }

        .btn-history {
            background: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--border);
        }

        #jsonOutput {
            background: #2b2b2b;
            color: #a9b7c6;
            padding: 15px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            word-wrap: break-word;
            display: none;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Actividades Diarias</h1>
        <div class="date" id="currentDate"></div>
        <div class="score-circle" id="scoreDisplay">0</div>
    </div>

    <div class="task-list" id="taskList">
        <!-- Las tareas se generarán dinámicamente -->
    </div>

    <button class="btn btn-save" onclick="saveDailyRecord()">Guardar Registro Diario</button>
    <button class="btn btn-history" onclick="toggleHistory()">Ver Historial (JSON)</button>
    
    <div id="jsonOutput"></div>
</div>

<script>
    // Lista ordenada lógicamente
    const activities = [
        "Levantarse 8am",
        "Hacer la cama",
        "Hacer gym 9 am",
        "Barrer gym",
        "Tomar sol",
        "Desayuno 11 am",
        "Limpieza del baño",
        "Almuerzo 2pm",
        "Robotina dormitorio",
        "Robotina comedor",
        "Barrer cocina",
        "Dejar mesón cocina limpio",
        "Ordenar casa",
        "Desechar cosas viejas casa",
        "Recoger hojas patio",
        "Ordenar patio",
        "Desechar cosas viejas patio",
        "Merienda 7pm",
        "Acostarse a las 12am (Medianoche)"
    ];

    const taskListDiv = document.getElementById('taskList');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const dateDisplay = document.getElementById('currentDate');
    const jsonOutput = document.getElementById('jsonOutput');

    // Obtener fecha actual en formato local
    const today = new Date();
    const dateString = today.toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    const shortDate = today.toISOString().split('T')[0]; // YYYY-MM-DD
    
    dateDisplay.textContent = dateString.charAt(0).toUpperCase() + dateString.slice(1);

    // Estado actual
    let currentScore = 0;

    // Inicializar la interfaz
    function initApp() {
        const savedState = JSON.parse(localStorage.getItem('actividades_estado_hoy')) || {};
        
        // Si es un día nuevo, resetear checkboxes
        if (savedState.date !== shortDate) {
            savedState.date = shortDate;
            savedState.checked = [];
        }

        activities.forEach((task, index) => {
            const div = document.createElement('div');
            div.className = 'task-item';
            
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.id = 'task_' + index;
            checkbox.checked = savedState.checked.includes(index);
            checkbox.addEventListener('change', () => updateScore());

            const label = document.createElement('label');
            label.htmlFor = 'task_' + index;
            label.textContent = task;

            div.appendChild(checkbox);
            div.appendChild(label);
            taskListDiv.appendChild(div);
        });

        updateScore();
    }

    function updateScore() {
        const checkboxes = document.querySelectorAll('input[type="checkbox"]');
        let checkedCount = 0;
        let checkedIndices = [];

        checkboxes.forEach((cb, index) => {
            if (cb.checked) {
                checkedCount++;
                checkedIndices.push(index);
            }
        });

        // Calcular puntaje sobre 100
        currentScore = Math.round((checkedCount / activities.length) * 100);
        scoreDisplay.textContent = currentScore;

        if (currentScore === 100) {
            scoreDisplay.classList.add('perfect');
        } else {
            scoreDisplay.classList.remove('perfect');
        }

        // Guardar estado actual de los checkboxes para no perderlos si se cierra la app
        localStorage.setItem('actividades_estado_hoy', JSON.stringify({
            date: shortDate,
            checked: checkedIndices
        }));
    }

    function saveDailyRecord() {
        let history = JSON.parse(localStorage.getItem('actividades_historial')) || [];
        
        // Buscar si ya existe un registro hoy para actualizarlo, si no, crearlo
        const existingIndex = history.findIndex(record => record.fecha === shortDate);
        
        const record = {
            fecha: shortDate,
            puntaje_total: currentScore,
            tareas_completadas: currentScore === 100 ? "Todas" : `${document.querySelectorAll('input[type="checkbox"]:checked').length}/${activities.length}`
        };

        if (existingIndex >= 0) {
            history[existingIndex] = record;
        } else {
            history.push(record);
        }

        localStorage.setItem('actividades_historial', JSON.stringify(history));
        
        // Mostrar feedback visual
        const btn = document.querySelector('.btn-save');
        btn.textContent = "¡Guardado exitosamente!";
        btn.style.background = "var(--success)";
        setTimeout(() => {
            btn.textContent = "Guardar Registro Diario";
            btn.style.background = "var(--primary)";
        }, 2000);

        if (jsonOutput.style.display === 'block') {
            showHistory();
        }
    }

    function toggleHistory() {
        if (jsonOutput.style.display === 'none' || jsonOutput.style.display === '') {
            showHistory();
            jsonOutput.style.display = 'block';
        } else {
            jsonOutput.style.display = 'none';
        }
    }

    function showHistory() {
        const history = JSON.parse(localStorage.getItem('actividades_historial')) || [];
        jsonOutput.textContent = JSON.stringify(history, null, 2);
    }

    // Arrancar la app
    initApp();
</script>

</body>
</html>
