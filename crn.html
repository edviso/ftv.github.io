<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente de Tueste Dinámico</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #ffffff;
            --accent-color: #ff9800;
            --box-bg: #1e1e1e;
            --success-color: #4caf50;
            --danger-color: #f44336;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--accent-color);
            margin-bottom: 20px;
            text-align: center;
        }

        /* Pantalla de Configuración */
        #setup-screen {
            background-color: var(--box-bg);
            padding: 20px;
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        select, textarea {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #333;
            background-color: #2c2c2c;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
        }

        textarea {
            height: 200px;
            resize: vertical;
            font-family: monospace;
        }

        button {
            width: 100%;
            padding: 15px;
            font-size: 1.3rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:active {
            transform: scale(0.98);
        }

        #btn-start {
            background-color: var(--success-color);
            color: white;
            margin-top: 10px;
        }

        /* Pantalla de Tueste */
        #roast-screen {
            display: none;
            width: 100%;
            max-width: 600px;
            text-align: center;
            margin-top: 5px;
        }

        .status-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 20px;
        }

        .status-box {
            background-color: var(--box-bg);
            padding: 20px;
            border-radius: 16px;
            border-left: 12px solid;
            box-shadow: 0 6px 15px rgba(0,0,0,0.6);
        }

        #box-actual { 
            border-color: var(--success-color); 
            background-color: #152516;
        }
        #box-next { 
            border-color: var(--accent-color); 
        }

        .box-title {
            font-size: 1.5rem;
            color: #bbb;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: bold;
        }

        .box-data {
            font-size: 3.2rem;
            font-weight: bold;
            display: flex;
            justify-content: center;
            gap: 30px;
            font-variant-numeric: tabular-nums;
        }

        #box-next .box-data {
            color: #ddd;
        }
        
        /* Controles de Acción (Botones) */
        .action-controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        #btn-hito {
            flex: 2;
            background-color: var(--success-color);
            color: white;
            font-size: 1.5rem;
        }

        #btn-stop {
            flex: 1;
            background-color: var(--danger-color);
            color: white;
        }
        
        .header-info {
            font-size: 1.2rem;
            color: #aaa;
            margin-bottom: 15px;
            font-weight: 500;
        }

        /* Gráfico en Tiempo Real */
        #chart-container {
            background-color: var(--box-bg);
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            width: 100%;
            box-sizing: border-box;
        }

        canvas {
            width: 100%;
            height: 200px;
            display: block;
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1>Configuración de Tueste</h1>
        
        <div class="form-group">
            <label for="variedad">Variedad:</label>
            <select id="variedad">
                <option value="Sidra Honey">Sidra Honey</option>
                <option value="Sidra Lavado">Sidra Lavado</option>
                <option value="Typica Lavado">Typica Lavado</option>
                <option value="Blend">Blend</option>
            </select>
        </div>

        <div class="form-group">
            <label for="perfil">Perfil:</label>
            <select id="perfil">
                <option value="Predeterminado">Predeterminado</option>
                <option value="Genérico">Genérico</option>
            </select>
        </div>

        <div class="form-group">
            <label for="secuencia">Secuencia (Min:Seg | Temp):</label>
            <textarea id="secuencia">
0:00 | 32°C
0:30 | 95°C
1:00 | 105°C
1:30 | 114°C
2:00 | 122°C
2:30 | 130°C
3:00 | 138°C
3:30 | 145°C
4:00 | 151°C
4:30 | 156°C
5:00 | 161°C
5:30 | 167°C
6:00 | 173°C
6:30 | 178°C
7:00 | 184°C
7:30 | 189°C
8:00 | 193°C
8:30 | 196°C
8:45 | 197°C 
9:00 | 199°C 
9:30 | 202°C 
10:00 | 205°C</textarea>
        </div>

        <button id="btn-start">Iniciar Tueste</button>
    </div>

    <div id="roast-screen">
        <div class="header-info" id="info-header"></div>

        <div class="status-container">
            <div class="status-box" id="box-actual">
                <div class="box-title">Actual</div>
                <div class="box-data">
                    <span id="actual-time">00:00</span>
                    <span id="actual-temp">--°C</span>
                </div>
            </div>

            <div class="status-box" id="box-next">
                <div class="box-title">Siguiente Hito</div>
                <div class="box-data">
                    <span id="next-time">--:--</span>
                    <span id="next-temp">--°C</span>
                </div>
            </div>
        </div>

        <div class="action-controls">
            <button id="btn-hito">Hito OK</button>
            <button id="btn-stop">Terminar</button>
        </div>

        <div id="chart-container">
            <canvas id="roast-chart"></canvas>
        </div>
    </div>

    <script>
        let timerInterval;
        let startTime;
        let sequenceData = [];
        let actualData = [];
        let expectedHitoIndex = 1; // Empezamos esperando el hito de 0:30 (índice 1)
        let wakeLock = null;

        const setupScreen = document.getElementById('setup-screen');
        const roastScreen = document.getElementById('roast-screen');
        const secuenciaInput = document.getElementById('secuencia');
        const btnStart = document.getElementById('btn-start');
        const btnStop = document.getElementById('btn-stop');
        const btnHito = document.getElementById('btn-hito');
        
        const actualTimeEl = document.getElementById('actual-time');
        const actualTempEl = document.getElementById('actual-temp');
        const nextTimeEl = document.getElementById('next-time');
        const nextTempEl = document.getElementById('next-temp');
        const infoHeader = document.getElementById('info-header');
        
        const canvas = document.getElementById('roast-chart');
        const ctx = canvas.getContext('2d');

        async function activarMantenerPantalla() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                } catch (err) {
                    console.error("No se pudo activar el anti-bloqueo:", err.message);
                }
            }
        }

        function desactivarMantenerPantalla() {
            if (wakeLock !== null) {
                wakeLock.release().then(() => { wakeLock = null; });
            }
        }

        function parseSequence(text) {
            const lines = text.trim().split('\n');
            const data = [];
            for (let line of lines) {
                if (!line.includes('|')) continue;
                let parts = line.split('|');
                let timeStr = parts[0].trim();
                let tempStr = parts[1].trim();
                let timeParts = timeStr.split(':');
                if (timeParts.length === 2) {
                    let min = parseInt(timeParts[0]);
                    let sec = parseInt(timeParts[1]);
                    let totalSeconds = (min * 60) + sec;
                    let tempValue = parseFloat(tempStr.replace(/[^0-9.]/g, ''));
                    data.push({
                        seconds: totalSeconds,
                        timeLabel: timeStr,
                        tempValue: tempValue
                    });
                }
            }
            return data.sort((a, b) => a.seconds - b.seconds);
        }

        function formatTime(totalSeconds) {
            let m = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
            let s = (totalSeconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function updateDisplay() {
            let now = Date.now();
            let elapsedSeconds = Math.floor((now - startTime) / 1000);
            
            // 1. Cronómetro general
            actualTimeEl.textContent = formatTime(elapsedSeconds);

            // 2. Temperatura Dinámica (Teórica) - El "Fantasma"
            let currentIndex = 0;
            for (let i = 0; i < sequenceData.length; i++) {
                if (elapsedSeconds >= sequenceData[i].seconds) currentIndex = i;
                else break;
            }

            let nextTimeIndex = currentIndex + 1;
            if (nextTimeIndex < sequenceData.length) {
                let currentMilestone = sequenceData[currentIndex];
                let nextMilestone = sequenceData[nextTimeIndex];
                let tiempoTramo = nextMilestone.seconds - currentMilestone.seconds;
                let tiempoTranscurridoTramo = elapsedSeconds - currentMilestone.seconds;
                let progreso = Math.min(tiempoTranscurridoTramo / tiempoTramo, 1);
                let rangoTemp = nextMilestone.tempValue - currentMilestone.tempValue;
                let tempInterpolada = currentMilestone.tempValue + (rangoTemp * progreso);
                actualTempEl.textContent = Math.round(tempInterpolada) + "°C";
            } else {
                actualTempEl.textContent = sequenceData[sequenceData.length - 1].tempValue + "°C";
            }

            // 3. Siguiente Hito (Controlado por el botón Hito OK, no por el tiempo)
            if (expectedHitoIndex < sequenceData.length) {
                nextTimeEl.textContent = sequenceData[expectedHitoIndex].timeLabel;
                nextTempEl.textContent = sequenceData[expectedHitoIndex].tempValue + "°C";
            } else {
                nextTimeEl.textContent = "FIN";
                nextTempEl.textContent = "---";
                btnHito.disabled = true;
                btnHito.style.opacity = "0.5";
            }
        }

        function drawChart() {
            // Ajustar resolución del canvas para nitidez
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = 200;

            const padding = 20;
            const width = canvas.width;
            const height = canvas.height;

            ctx.clearRect(0, 0, width, height);

            if (sequenceData.length === 0) return;

            const maxSec = sequenceData[sequenceData.length - 1].seconds;
            const minTemp = sequenceData[0].tempValue;
            const maxTemp = sequenceData[sequenceData.length - 1].tempValue;

            const getX = (sec) => padding + (sec / maxSec) * (width - 2 * padding);
            const getY = (temp) => height - padding - ((temp - minTemp) / (maxTemp - minTemp)) * (height - 2 * padding);

            // Dibujar Ejes
            ctx.beginPath();
            ctx.strokeStyle = '#444';
            ctx.lineWidth = 1;
            ctx.moveTo(padding, padding);
            ctx.lineTo(padding, height - padding);
            ctx.lineTo(width - padding, height - padding);
            ctx.stroke();

            // Dibujar Curva Teórica (Punteada Gris)
            ctx.beginPath();
            ctx.strokeStyle = '#777';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            sequenceData.forEach((pt, i) => {
                if (i === 0) ctx.moveTo(getX(pt.seconds), getY(pt.tempValue));
                else ctx.lineTo(getX(pt.seconds), getY(pt.tempValue));
            });
            ctx.stroke();
            ctx.setLineDash([]); // Reset dash

            // Dibujar Curva Real (Naranja Gruesa)
            if (actualData.length > 0) {
                ctx.beginPath();
                ctx.strokeStyle = '#ff9800';
                ctx.lineWidth = 3;
                actualData.forEach((pt, i) => {
                    if (i === 0) ctx.moveTo(getX(pt.seconds), getY(pt.tempValue));
                    else ctx.lineTo(getX(pt.seconds), getY(pt.tempValue));
                });
                ctx.stroke();
                
                // Dibujar puntitos en los hitos reales
                ctx.fillStyle = '#ffffff';
                actualData.forEach(pt => {
                    ctx.beginPath();
                    ctx.arc(getX(pt.seconds), getY(pt.tempValue), 4, 0, Math.PI * 2);
                    ctx.fill();
                });
            }
        }

        // Exportar JSON
        function exportarJSON() {
            const variedad = document.getElementById('variedad').value;
            const perfil = document.getElementById('perfil').value;
            
            const exportData = {
                fecha: new Date().toISOString(),
                variedad: variedad,
                perfil: perfil,
                puntos_reales: actualData
            };

            const dataStr = JSON.stringify(exportData, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Tueste_${variedad.replace(/\s+/g, '_')}_${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // --- EVENTOS ---

        btnStart.addEventListener('click', async () => {
            let seqText = secuenciaInput.value;
            sequenceData = parseSequence(seqText);
            
            if (sequenceData.length === 0) {
                alert("Verifica el formato de la secuencia.");
                return;
            }

            let variedad = document.getElementById('variedad').value;
            let perfil = document.getElementById('perfil').value;
            infoHeader.textContent = `${variedad} (${perfil})`;

            setupScreen.style.display = 'none';
            roastScreen.style.display = 'block';
            
            btnHito.disabled = false;
            btnHito.style.opacity = "1";

            await activarMantenerPantalla();

            startTime = Date.now();
            expectedHitoIndex = 1; // Esperamos el primer salto de temp (ej. 0:30)
            
            // Registrar punto inicial (0:00)
            actualData = [{
                timeLabel: "0:00",
                seconds: 0,
                tempValue: sequenceData[0].tempValue
            }];
            
            // Dibujar gráfico inicial
            setTimeout(drawChart, 100); 

            updateDisplay();
            timerInterval = setInterval(updateDisplay, 1000);
        });

        // Botón Hito OK
        btnHito.addEventListener('click', () => {
            if (expectedHitoIndex < sequenceData.length) {
                let targetMilestone = sequenceData[expectedHitoIndex];
                let elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);
                
                // Guardamos el tiempo real en el que se alcanzó la temperatura objetivo
                actualData.push({
                    timeLabel: formatTime(elapsedSeconds),
                    seconds: elapsedSeconds,
                    tempValue: targetMilestone.tempValue
                });

                expectedHitoIndex++;
                drawChart();
                updateDisplay(); // Forzar actualización visual al instante
            }
        });

        btnStop.addEventListener('click', () => {
            clearInterval(timerInterval);
            
            let confirmacion = confirm("¿Deseas terminar el tueste, generar la curva JSON y volver al menú?");
            if (confirmacion) {
                exportarJSON(); // Descarga el archivo
                desactivarMantenerPantalla();
                setupScreen.style.display = 'block';
                roastScreen.style.display = 'none';
                actualTimeEl.textContent = "00:00";
            } else {
                timerInterval = setInterval(updateDisplay, 1000);
            }
        });

        // Redibujar el gráfico si cambias la orientación del celular
        window.addEventListener('resize', () => {
            if (roastScreen.style.display === 'block') {
                drawChart();
            }
        });
    </script>
</body>
</html>
