<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente de Tueste - Vinza</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #ffffff;
            --accent-color: #ff9800;
            --box-bg: #1e1e1e;
            --success-color: #4caf50;
            --danger-color: #f44336;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--accent-color);
            margin-bottom: 20px;
        }

        /* Pantalla de Configuración */
        #setup-screen {
            background-color: var(--box-bg);
            padding: 20px;
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        select, textarea {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #333;
            background-color: #2c2c2c;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
        }

        textarea {
            height: 200px;
            resize: vertical;
            font-family: monospace;
        }

        button {
            width: 100%;
            padding: 15px;
            font-size: 1.5rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:active {
            transform: scale(0.98);
        }

        #btn-start {
            background-color: var(--success-color);
            color: white;
            margin-top: 10px;
        }

        /* Pantalla de Tueste */
        #roast-screen {
            display: none;
            width: 100%;
            max-width: 800px;
            text-align: center;
        }

        #main-timer {
            font-size: 6rem;
            font-weight: bold;
            color: var(--accent-color);
            margin: 20px 0;
            font-variant-numeric: tabular-nums;
        }

        .status-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
        }

        .status-box {
            background-color: var(--box-bg);
            padding: 20px;
            border-radius: 12px;
            border-left: 8px solid;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        #box-actual { border-color: var(--success-color); }
        #box-next { border-color: var(--accent-color); }

        .box-title {
            font-size: 1.5rem;
            color: #aaa;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .box-data {
            font-size: 3.5rem;
            font-weight: bold;
            display: flex;
            justify-content: center;
            gap: 40px;
        }

        .box-data span {
            display: inline-block;
        }

        #btn-stop {
            background-color: var(--danger-color);
            color: white;
            max-width: 300px;
            margin: 0 auto;
        }
        
        .header-info {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1>Configuración de Tueste</h1>
        
        <div class="form-group">
            <label for="variedad">Variedad:</label>
            <select id="variedad">
                <option value="Sidra Honey">Sidra Honey</option>
                <option value="Sidra Lavado">Sidra Lavado</option>
                <option value="Typica Lavado">Typica Lavado</option>
                <option value="Blend">Blend</option>
            </select>
        </div>

        <div class="form-group">
            <label for="perfil">Perfil:</label>
            <select id="perfil">
                <option value="Predeterminado">Predeterminado</option>
                <option value="Genérico">Genérico</option>
            </select>
        </div>

        <div class="form-group">
            <label for="secuencia">Secuencia (Min:Seg | Temp):</label>
            <textarea id="secuencia">
0:00 | 32°C
0:30 | 95°C
1:00 | 105°C
1:30 | 114°C
2:00 | 122°C
2:30 | 130°C
3:00 | 138°C
3:30 | 145°C
4:00 | 151°C
4:30 | 156°C
5:00 | 161°C
5:30 | 167°C
6:00 | 173°C
6:30 | 178°C
7:00 | 184°C
7:30 | 189°C
8:00 | 193°C
8:30 | 196°C
8:45 | 197°C 
9:00 | 199°C 
9:30 | 202°C 
10:00 | 205°C</textarea>
        </div>

        <button id="btn-start">Iniciar Tueste</button>
    </div>

    <div id="roast-screen">
        <div class="header-info" id="info-header"></div>
        
        <div id="main-timer">00:00</div>

        <div class="status-container">
            <div class="status-box" id="box-actual">
                <div class="box-title">Actual</div>
                <div class="box-data">
                    <span id="actual-time">--:--</span>
                    <span id="actual-temp">--°C</span>
                </div>
            </div>

            <div class="status-box" id="box-next">
                <div class="box-title">Siguiente</div>
                <div class="box-data">
                    <span id="next-time">--:--</span>
                    <span id="next-temp">--°C</span>
                </div>
            </div>
        </div>

        <button id="btn-stop">Detener / Terminar</button>
    </div>

    <script>
        // Variables globales
        let timerInterval;
        let startTime;
        let sequenceData = [];

        // Elementos del DOM
        const setupScreen = document.getElementById('setup-screen');
        const roastScreen = document.getElementById('roast-screen');
        const secuenciaInput = document.getElementById('secuencia');
        const btnStart = document.getElementById('btn-start');
        const btnStop = document.getElementById('btn-stop');
        
        const mainTimer = document.getElementById('main-timer');
        const actualTimeEl = document.getElementById('actual-time');
        const actualTempEl = document.getElementById('actual-temp');
        const nextTimeEl = document.getElementById('next-time');
        const nextTempEl = document.getElementById('next-temp');
        const infoHeader = document.getElementById('info-header');

        // Función para procesar el texto de la secuencia
        function parseSequence(text) {
            const lines = text.trim().split('\n');
            const data = [];
            
            for (let line of lines) {
                if (!line.includes('|')) continue; // Ignorar líneas inválidas
                
                let parts = line.split('|');
                let timeStr = parts[0].trim();
                let tempStr = parts[1].trim();
                
                let timeParts = timeStr.split(':');
                if (timeParts.length === 2) {
                    let min = parseInt(timeParts[0]);
                    let sec = parseInt(timeParts[1]);
                    let totalSeconds = (min * 60) + sec;
                    
                    data.push({
                        seconds: totalSeconds,
                        timeLabel: timeStr,
                        tempLabel: tempStr
                    });
                }
            }
            
            // Ordenar por si acaso los pegaron en desorden
            return data.sort((a, b) => a.seconds - b.seconds);
        }

        // Formatear segundos a MM:SS
        function formatTime(totalSeconds) {
            let m = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
            let s = (totalSeconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        // Actualizar la pantalla cada segundo
        function updateDisplay() {
            let now = Date.now();
            let elapsedSeconds = Math.floor((now - startTime) / 1000);
            
            // Actualizar cronómetro general
            mainTimer.textContent = formatTime(elapsedSeconds);

            // Determinar etapa actual y siguiente
            let currentIndex = 0;
            for (let i = 0; i < sequenceData.length; i++) {
                if (elapsedSeconds >= sequenceData[i].seconds) {
                    currentIndex = i;
                } else {
                    break;
                }
            }

            let nextIndex = currentIndex + 1;

            // Mostrar Actual
            actualTimeEl.textContent = sequenceData[currentIndex].timeLabel;
            actualTempEl.textContent = sequenceData[currentIndex].tempLabel;

            // Mostrar Siguiente (o Finalizado)
            if (nextIndex < sequenceData.length) {
                nextTimeEl.textContent = sequenceData[nextIndex].timeLabel;
                nextTempEl.textContent = sequenceData[nextIndex].tempLabel;
            } else {
                nextTimeEl.textContent = "FIN";
                nextTempEl.textContent = "---";
            }
        }

        // Iniciar el proceso
        btnStart.addEventListener('click', () => {
            let seqText = secuenciaInput.value;
            sequenceData = parseSequence(seqText);
            
            if (sequenceData.length === 0) {
                alert("La secuencia no tiene el formato correcto. Asegúrate de usar 'Min:Seg | Temp°C'");
                return;
            }

            // Mostrar info en la cabecera
            let variedad = document.getElementById('variedad').value;
            let perfil = document.getElementById('perfil').value;
            infoHeader.textContent = `Tostando: ${variedad} - Perfil: ${perfil}`;

            // Cambiar pantallas
            setupScreen.style.display = 'none';
            roastScreen.style.display = 'block';

            // Iniciar cronómetros
            startTime = Date.now();
            updateDisplay(); // Llamada inicial para no esperar 1 segundo
            timerInterval = setInterval(updateDisplay, 1000);
        });

        // Detener el proceso
        btnStop.addEventListener('click', () => {
            clearInterval(timerInterval);
            let confirmacion = confirm("¿Deseas terminar este tueste y volver al menú?");
            if (confirmacion) {
                setupScreen.style.display = 'block';
                roastScreen.style.display = 'none';
                mainTimer.textContent = "00:00";
            } else {
                // Si cancela, el cronómetro sigue donde se quedó (calculando la diferencia)
                // Se tendría que reajustar startTime si se quiere pausar, 
                // pero en tueste no hay pausa, el calor sigue. Así que reiniciamos el intervalo.
                timerInterval = setInterval(updateDisplay, 1000);
            }
        });
    </script>
</body>
</html>
