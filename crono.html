<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente de Tueste - Vinza Café</title>
    <style>
        :root { --bg-color: #121212; --text-color: #ffffff; --accent-color: #ff9800; --box-bg: #1e1e1e; --success-color: #4caf50; --danger-color: #f44336; --info-color: #2196f3; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1, h2 { color: var(--accent-color); margin-bottom: 20px; text-align: center; }
        .screen { display: none; width: 100%; max-width: 600px; }
        .panel { background-color: var(--box-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        input[type="text"], select, textarea { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #333; background-color: #2c2c2c; color: white; font-size: 1rem; }
        button { width: 100%; padding: 15px; font-size: 1.2rem; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; margin-bottom: 10px; }
        .btn-primary { background-color: var(--success-color); color: white; }
        .btn-secondary { background-color: #555; color: white; }
        .btn-danger { background-color: var(--danger-color); color: white; }
        .btn-info { background-color: var(--info-color); color: white; }
        .btn-warning { background-color: var(--accent-color); color: white; }
        .action-btns { display: flex; gap: 5px; justify-content: center; }
        .btn-icon { background: transparent; border: none; font-size: 1.2rem; cursor: pointer; padding: 5px; }
        #edit-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; }
        .modal-content { background: var(--box-bg); padding: 20px; border-radius: 12px; width: 90%; max-width: 400px; }
    </style>
</head>
<body>
    <div id="setup-screen" class="screen panel">
        <h1>Configuración de Tueste</h1>
        <div class="form-group"><label>Tostador:</label><input type="text" id="tostador"></div>
        <div class="form-group"><label>Variedad:</label><select id="variedad"><option>Sidra Honey</option><option>Sidra Lavado</option><option>Typica Lavado</option><option>Blend</option></select></div>
        <div class="form-group"><label>Perfil:</label><select id="perfil"><option>Genérico</option><option>Predeterminado</option></select></div>
        <textarea id="secuencia" style="width: 100%; height: 150px; background: #2c2c2c; color: white; font-family: monospace;">0:00 | 32°C | C

        <button id="btn-start" class="btn-primary">Iniciar Tueste</button>
        <button id="btn-view-history" class="btn-secondary">Ver Historial</button>
        <button id="btn-trigger-load" class="btn-info">Cargar JSON</button>
        <input type="file" id="file-loader" accept=".json" style="display: none;">
    </div>

    <div id="roast-screen" class="screen">...</div>
    <div id="result-screen" class="screen panel">...</div>
    <div id="history-screen" class="screen panel">...</div>
    
    <div id="edit-modal"><div class="modal-content"><h3>Editar</h3><input type="text" id="edit-tostador"><input type="text" id="edit-variedad"><button id="btn-save-edit">Guardar</button></div></div>

            document.getElementById('file-loader').click();
        });

        document.getElementById('file-loader').addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (!file) return;

</body>
</html>
