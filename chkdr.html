<!DOCTYPE html>
<html lang="es">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Actividades Diarias</title>
    <style>
        :root {
            --primary: #4361ee;
            --success: #2ec4b6;
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #f8f9fa;
            font-family: sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            /* 100dvh se ajusta dinámicamente restando la barra del navegador */
            height: 100dvh; 
            padding: 10px;
            box-sizing: border-box;
            overflow: hidden; /* Evita el scroll general */
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 15px;
            background: white;
            border-radius: 10px;
            margin-bottom: 10px;
            flex-shrink: 0; /* Evita que el encabezado se aplaste */
        }

        h1 { font-size: 1.1rem; margin: 0; }

        .score-circle {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .task-list {
            flex: 1; /* Toma todo el espacio disponible en el medio */
            overflow-y: auto; /* Permite scroll ÚNICAMENTE a la lista */
            min-height: 0; /* Regla vital para que flexbox no rompa el contenedor */
            background: white;
            border-radius: 10px;
            padding: 0 10px;
            margin-bottom: 10px;
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .task-item:last-child {
            border-bottom: none;
        }

        .task-item input { width: 22px; height: 22px; margin-right: 12px; accent-color: var(--primary); }
        .task-item label { font-size: 0.95rem; }

        .actions { 
            display: flex; 
            gap: 10px; 
            flex-shrink: 0; /* Asegura que los botones NUNCA se oculten */
        }
        
        .btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
        .btn-save { background: var(--primary); color: white; }
        .btn-history { background: #e9ecef; color: #333; }
        
        #jsonOutput {
            display: none; 
            font-size: 11px; 
            height: 100px; 
            overflow: auto; 
            background: #333; 
            color: #fff; 
            padding: 10px; 
            border-radius: 8px; 
            margin-top: 10px; 
            flex-shrink: 0;
        }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h1 id="dateTitle">Hoy</h1>
    </div>
    <div class="score-circle" id="scoreDisplay">0</div>
</div>

<div class="task-list" id="taskList"></div>

<div class="actions">
    <button class="btn btn-save" onclick="saveDailyRecord()">Guardar</button>
    <button class="btn btn-history" onclick="toggleHistory()">Ver JSON</button>
</div>
<pre id="jsonOutput"></pre>

<script>
    const activities = [
        "Levantarse 8am", "Hacer la cama", "Hacer gym 9 am", "Barrer gym", 
        "Tomar sol", "Desayuno 11 am", "Limpieza del baño", "Almuerzo 2pm", 
        "Robotina dormitorio", "Robotina comedor", "Barrer cocina", 
        "Dejar mesón cocina limpio", "Ordenar casa", "Desechar cosas viejas casa", 
        "Recoger hojas patio", "Ordenar patio", "Desechar cosas viejas patio", 
        "Merienda 7pm", "Acostarse a las 12am"
    ];
    
    const taskListDiv = document.getElementById('taskList');
    const today = new Date().toISOString().split('T')[0];
    
    // Formatear la fecha en la parte superior
    const dateOptions = { weekday: 'long', month: 'short', day: 'numeric' };
    let dateStr = new Date().toLocaleDateString('es-ES', dateOptions);
    document.getElementById('dateTitle').textContent = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);

    function init() {
        // Cargar estado de los checks del día actual
        const saved = JSON.parse(localStorage.getItem('actividades_estado_hoy') || '{}');
        
        // Si cambió de día, borrar checks
        if (saved.date !== today) {
            saved.date = today;
            saved.checked = [];
        }

        activities.forEach((task, i) => {
            const div = document.createElement('div');
            div.className = 'task-item';
            div.innerHTML = `<input type="checkbox" id="t${i}" ${saved.checked?.includes(i) ? 'checked' : ''} onchange="update()"> <label for="t${i}">${task}</label>`;
            taskListDiv.appendChild(div);
        });
        update();
    }

    function update() {
        const checkboxes = Array.from(document.querySelectorAll('input[type="checkbox"]'));
        const checkedIndices = [];
        
        checkboxes.forEach((cb, index) => {
            if (cb.checked) checkedIndices.push(index);
        });

        const score = Math.round((checkedIndices.length / activities.length) * 100);
        
        // Actualizar visualmente el puntaje
        document.getElementById('scoreDisplay').textContent = score;
        document.getElementById('scoreDisplay').style.background = score === 100 ? '#2ec4b6' : '#4361ee';

        // Guardar estado temporal para no perder los checks si se recarga la página
        localStorage.setItem('actividades_estado_hoy', JSON.stringify({
            date: today,
            checked: checkedIndices
        }));
    }

    function saveDailyRecord() {
        let history = JSON.parse(localStorage.getItem('actividades_historial') || '[]');
        const score = document.getElementById('scoreDisplay').textContent;
        
        // Reemplazar registro si ya se guardó hoy
        history = history.filter(h => h.fecha !== today);
        history.push({ fecha: today, puntaje: parseInt(score) });
        
        localStorage.setItem('actividades_historial', JSON.stringify(history));
        
        // Confirmación visual en el botón
        const btn = document.querySelector('.btn-save');
        btn.textContent = "¡Guardado!";
        btn.style.background = "var(--success)";
        setTimeout(() => {
            btn.textContent = "Guardar";
            btn.style.background = "var(--primary)";
        }, 1500);

        if (document.getElementById('jsonOutput').style.display === 'block') {
            document.getElementById('jsonOutput').textContent = JSON.stringify(history, null, 2);
        }
    }

    function toggleHistory() {
        const div = document.getElementById('jsonOutput');
        const history = JSON.parse(localStorage.getItem('actividades_historial') || '[]');
        
        if (div.style.display === 'none' || div.style.display === '') {
            div.style.display = 'block';
            div.textContent = JSON.stringify(history, null, 2);
        } else {
            div.style.display = 'none';
        }
    }
    
    init();
</script>
</body>
</html>
