<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Actividades Diarias</title>
    <style>
        :root {
            --primary: #4361ee;
            --success: #2ec4b6;
        }

        body {
            font-family: sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 5px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 15px;
            background: white;
            border-radius: 10px;
            margin-bottom: 5px;
        }

        h1 { font-size: 1rem; margin: 0; }

        .score-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .task-list {
            flex-grow: 1;
            overflow-y: auto; /* Mínimo necesario si la pantalla es muy pequeña */
            background: white;
            border-radius: 10px;
            padding: 0 10px;
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 3px 0;
            border-bottom: 1px solid #eee;
        }

        .task-item input { width: 20px; height: 20px; margin-right: 10px; }
        .task-item label { font-size: 0.85rem; }

        .actions { display: flex; gap: 5px; margin-top: 5px; }
        .btn { flex: 1; padding: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.8rem; }
        .btn-save { background: var(--primary); color: white; }
        .btn-history { background: #eee; }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h1 id="dateTitle">Hoy</h1>
    </div>
    <div class="score-circle" id="scoreDisplay">0</div>
</div>

<div class="task-list" id="taskList"></div>

<div class="actions">
    <button class="btn btn-save" onclick="saveDailyRecord()">Guardar</button>
    <button class="btn btn-history" onclick="toggleHistory()">JSON</button>
</div>
<pre id="jsonOutput" style="display:none; font-size: 10px; height: 100px; overflow: auto; background: #333; color: #fff; padding: 5px;"></pre>

<script>
    const activities = ["Levantarse 8am", "Hacer la cama", "Hacer gym 9 am", "Barrer gym", "Tomar sol", "Desayuno 11 am", "Limpieza del baño", "Almuerzo 2pm", "Robotina dormitorio", "Robotina comedor", "Barrer cocina", "Dejar mesón cocina limpio", "Ordenar casa", "Desechar cosas viejas casa", "Recoger hojas patio", "Ordenar patio", "Desechar cosas viejas patio", "Merienda 7pm", "Acostarse a las 12am"];
    
    const taskListDiv = document.getElementById('taskList');
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('dateTitle').textContent = new Date().toLocaleDateString('es-ES', {month: 'short', day: 'numeric'});

    function init() {
        const saved = JSON.parse(localStorage.getItem('data') || '{}');
        activities.forEach((task, i) => {
            const div = document.createElement('div');
            div.className = 'task-item';
            div.innerHTML = `<input type="checkbox" id="t${i}" ${saved.checked?.includes(i) ? 'checked' : ''} onchange="update()"> <label for="t${i}">${task}</label>`;
            taskListDiv.appendChild(div);
        });
        update();
    }

    function update() {
        const checked = Array.from(document.querySelectorAll('input:checked')).length;
        const score = Math.round((checked / activities.length) * 100);
        document.getElementById('scoreDisplay').textContent = score;
        document.getElementById('scoreDisplay').style.background = score === 100 ? '#2ec4b6' : '#4361ee';
    }

    function saveDailyRecord() {
        let history = JSON.parse(localStorage.getItem('history') || '[]');
        const checked = [];
        document.querySelectorAll('input').forEach((el, i) => { if(el.checked) checked.push(i); });
        
        history = history.filter(h => h.fecha !== today);
        history.push({ fecha: today, puntaje: document.getElementById('scoreDisplay').textContent });
        localStorage.setItem('history', JSON.stringify(history));
        alert("Guardado");
    }

    function toggleHistory() {
        const div = document.getElementById('jsonOutput');
        div.style.display = div.style.display === 'none' ? 'block' : 'none';
        div.textContent = localStorage.getItem('history');
    }
    init();
</script>
</body>
</html>
