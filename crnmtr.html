<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente de Tueste Dinámico</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #ffffff;
            --accent-color: #ff9800;
            --box-bg: #1e1e1e;
            --success-color: #4caf50;
            --danger-color: #f44336;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--accent-color);
            margin-bottom: 20px;
            text-align: center;
        }

        /* Pantalla de Configuración */
        #setup-screen {
            background-color: var(--box-bg);
            padding: 20px;
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        select, textarea {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #333;
            background-color: #2c2c2c;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
        }

        textarea {
            height: 200px;
            resize: vertical;
            font-family: monospace;
        }

        button {
            width: 100%;
            padding: 15px;
            font-size: 1.5rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:active {
            transform: scale(0.98);
        }

        #btn-start {
            background-color: var(--success-color);
            color: white;
            margin-top: 10px;
        }

        /* Pantalla de Tueste */
        #roast-screen {
            display: none;
            width: 100%;
            max-width: 600px;
            text-align: center;
            margin-top: 10px;
        }

        .status-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-bottom: 30px;
        }

        .status-box {
            background-color: var(--box-bg);
            padding: 30px 20px;
            border-radius: 16px;
            border-left: 12px solid;
            box-shadow: 0 6px 15px rgba(0,0,0,0.6);
        }

        #box-actual { 
            border-color: var(--success-color); 
            background-color: #152516;
        }
        #box-next { 
            border-color: var(--accent-color); 
        }

        .box-title {
            font-size: 1.8rem;
            color: #bbb;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: bold;
        }

        .box-data {
            font-size: 4.8rem;
            font-weight: bold;
            display: flex;
            justify-content: center;
            gap: 40px;
            font-variant-numeric: tabular-nums;
        }

        #box-next .box-data {
            font-size: 3.2rem;
            color: #ddd;
        }

        #btn-stop {
            background-color: var(--danger-color);
            color: white;
            max-width: 300px;
            margin: 0 auto;
        }
        
        .header-info {
            font-size: 1.4rem;
            color: #aaa;
            margin-bottom: 20px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1>Configuración de Tueste</h1>
        
        <div class="form-group">
            <label for="variedad">Variedad:</label>
            <select id="variedad">
                <option value="Sidra Honey">Sidra Honey</option>
                <option value="Sidra Lavado">Sidra Lavado</option>
                <option value="Typica Lavado">Typica Lavado</option>
                <option value="Blend">Blend</option>
            </select>
        </div>

        <div class="form-group">
            <label for="perfil">Perfil:</label>
            <select id="perfil">
                <option value="Predeterminado">Predeterminado</option>
                <option value="Genérico">Genérico</option>
            </select>
        </div>

        <div class="form-group">
            <label for="secuencia">Secuencia (Min:Seg | Temp):</label>
            <textarea id="secuencia">
0:00 | 32°C
0:30 | 95°C
1:00 | 105°C
1:30 | 114°C
2:00 | 122°C
2:30 | 130°C
3:00 | 138°C
3:30 | 145°C
4:00 | 151°C
4:30 | 156°C
5:00 | 161°C
5:30 | 167°C
6:00 | 173°C
6:30 | 178°C
7:00 | 184°C
7:30 | 189°C
8:00 | 193°C
8:30 | 196°C
8:45 | 197°C 
9:00 | 199°C 
9:30 | 202°C 
10:00 | 205°C</textarea>
        </div>

        <button id="btn-start">Iniciar Tueste</button>
    </div>

    <div id="roast-screen">
        <div class="header-info" id="info-header"></div>

        <div class="status-container">
            <div class="status-box" id="box-actual">
                <div class="box-title">Actual</div>
                <div class="box-data">
                    <span id="actual-time">00:00</span>
                    <span id="actual-temp">--°C</span>
                </div>
            </div>

            <div class="status-box" id="box-next">
                <div class="box-title">Siguiente Hito</div>
                <div class="box-data">
                    <span id="next-time">--:--</span>
                    <span id="next-temp">--°C</span>
                </div>
            </div>
        </div>

        <button id="btn-stop">Detener / Terminar</button>
    </div>

    <script>
        let timerInterval;
        let startTime;
        let sequenceData = [];
        let wakeLock = null;

        const setupScreen = document.getElementById('setup-screen');
        const roastScreen = document.getElementById('roast-screen');
        const secuenciaInput = document.getElementById('secuencia');
        const btnStart = document.getElementById('btn-start');
        const btnStop = document.getElementById('btn-stop');
        
        const actualTimeEl = document.getElementById('actual-time');
        const actualTempEl = document.getElementById('actual-temp');
        const nextTimeEl = document.getElementById('next-time');
        const nextTempEl = document.getElementById('next-temp');
        const infoHeader = document.getElementById('info-header');

        // Función para mantener la pantalla encendida
        async function activarMantenerPantalla() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log("Anti-bloqueo de pantalla activado con éxito.");
                } catch (err) {
                    console.error("No se pudo activar el anti-bloqueo:", err.message);
                }
            } else {
                console.log("El navegador no soporta mantener la pantalla encendida automáticamente.");
            }
        }

        // Liberar el bloqueo de pantalla
        function desactivarMantenerPantalla() {
            if (wakeLock !== null) {
                wakeLock.release().then(() => {
                    wakeLock = null;
                    console.log("Pantalla liberada a su comportamiento normal.");
                });
            }
        }

        function parseSequence(text) {
            const lines = text.trim().split('\n');
            const data = [];
            
            for (let line of lines) {
                if (!line.includes('|')) continue;
                
                let parts = line.split('|');
                let timeStr = parts[0].trim();
                let tempStr = parts[1].trim();
                
                let timeParts = timeStr.split(':');
                if (timeParts.length === 2) {
                    let min = parseInt(timeParts[0]);
                    let sec = parseInt(timeParts[1]);
                    let totalSeconds = (min * 60) + sec;
                    
                    // Extraer solo los números de la temperatura (ej: "114°C" -> 114)
                    let tempValue = parseFloat(tempStr.replace(/[^0-9.]/g, ''));
                    
                    data.push({
                        seconds: totalSeconds,
                        timeLabel: timeStr,
                        tempValue: tempValue
                    });
                }
            }
            return data.sort((a, b) => a.seconds - b.seconds);
        }

        function formatTime(totalSeconds) {
            let m = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
            let s = (totalSeconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function updateDisplay() {
            let now = Date.now();
            let elapsedSeconds = Math.floor((now - startTime) / 1000);
            
            // 1. Actualizar el CRONÓMETRO de reojo en el cuadro Actual
            actualTimeEl.textContent = formatTime(elapsedSeconds);

            // Buscar en qué tramo de la secuencia nos encontramos
            let currentIndex = 0;
            for (let i = 0; i < sequenceData.length; i++) {
                if (elapsedSeconds >= sequenceData[i].seconds) {
                    currentIndex = i;
                } else {
                    break;
                }
            }

            let nextIndex = currentIndex + 1;

            // 2. Calcular la TEMPERATURA DINÁMICA (Interpolación segundo a segundo)
            if (nextIndex < sequenceData.length) {
                let currentMilestone = sequenceData[currentIndex];
                let nextMilestone = sequenceData[nextIndex];
                
                let tiempoTramo = nextMilestone.seconds - currentMilestone.seconds;
                let tiempoTranscurridoTramo = elapsedSeconds - currentMilestone.seconds;
                
                // Fracción de progreso en el tramo de 30s (o el tiempo que dure el tramo)
                let progreso = tiempoTranscurridoTramo / tiempoTramo;
                
                // Evitar desbordes por pequeños desfases de milisegundos
                if (progreso > 1) progreso = 1; 
                
                let rangoTemp = nextMilestone.tempValue - currentMilestone.tempValue;
                let tempInterpolada = currentMilestone.tempValue + (rangoTemp * progreso);
                
                // Mostrar temperatura estimada al segundo (Redondeada)
                actualTempEl.textContent = Math.round(tempInterpolada) + "°C";

                // Mostrar el hito Fijo que viene en el bloque Siguiente
                nextTimeEl.textContent = nextMilestone.timeLabel;
                nextTempEl.textContent = nextMilestone.tempValue + "°C";
            } else {
                // Si pasamos el último hito de la lista
                actualTempEl.textContent = sequenceData[sequenceData.length - 1].tempValue + "°C";
                nextTimeEl.textContent = "FIN";
                nextTempEl.textContent = "---";
            }
        }

        btnStart.addEventListener('click', async () => {
            let seqText = secuenciaInput.value;
            sequenceData = parseSequence(seqText);
            
            if (sequenceData.length === 0) {
                alert("Verifica el formato de la secuencia.");
                return;
            }

            let variedad = document.getElementById('variedad').value;
            let perfil = document.getElementById('perfil').value;
            infoHeader.textContent = `${variedad} (${perfil})`;

            setupScreen.style.display = 'none';
            roastScreen.style.display = 'block';

            // Activar la persistencia de pantalla
            await activarMantenerPantalla();

            startTime = Date.now();
            updateDisplay();
            timerInterval = setInterval(updateDisplay, 1000);
        });

        btnStop.addEventListener('click', () => {
            clearInterval(timerInterval);
            let confirmacion = confirm("¿Terminar este proceso y volver a la configuración?");
            if (confirmacion) {
                desactivarMantenerPantalla(); // Devolver control de pantalla al sistema
                setupScreen.style.display = 'block';
                roastScreen.style.display = 'none';
                actualTimeEl.textContent = "00:00";
            } else {
                timerInterval = setInterval(updateDisplay, 1000);
            }
        });
    </script>
</body>
</html>
