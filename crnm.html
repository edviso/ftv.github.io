<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente de Tueste - Vinza Café</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #ffffff;
            --accent-color: #ff9800;
            --box-bg: #1e1e1e;
            --success-color: #4caf50;
            --danger-color: #f44336;
            --info-color: #2196f3;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1, h2 {
            color: var(--accent-color);
            margin-bottom: 20px;
            text-align: center;
        }

        .screen {
            display: none;
            width: 100%;
            max-width: 600px;
        }

        #setup-screen { display: block; } /* Visible por defecto */

        .panel {
            background-color: var(--box-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        .form-group { margin-bottom: 15px; }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        input[type="text"], select, textarea {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #333;
            background-color: #2c2c2c;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
        }

        textarea {
            height: 150px;
            resize: vertical;
            font-family: monospace;
        }

        button {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            margin-bottom: 10px;
        }

        button:active { transform: scale(0.98); }

        .btn-primary { background-color: var(--success-color); color: white; }
        .btn-secondary { background-color: #555; color: white; }
        .btn-danger { background-color: var(--danger-color); color: white; }
        .btn-info { background-color: var(--info-color); color: white; }

        /* Pantalla de Tueste (Tiempo Real) */
        .status-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 20px;
        }

        .status-box {
            background-color: var(--box-bg);
            padding: 20px;
            border-radius: 16px;
            border-left: 12px solid;
            text-align: center;
        }

        #box-actual { border-color: var(--success-color); background-color: #152516; }
        #box-next { border-color: var(--accent-color); }

        .box-title {
            font-size: 1.5rem;
            color: #bbb;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .box-data {
            font-size: 3.2rem;
            font-weight: bold;
            display: flex;
            justify-content: center;
            gap: 30px;
            font-variant-numeric: tabular-nums;
        }

        #box-next .box-data { color: #ddd; }

        .action-controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        #btn-hito { flex: 2; font-size: 1.5rem; }
        #btn-stop { flex: 1; }

        canvas {
            background-color: #1a1a1a;
            border-radius: 8px;
            width: 100%;
            height: 250px;
            display: block;
            margin-top: 10px;
        }

        /* Pantalla de Resultados y Detalles */
        .result-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .score-display {
            font-size: 4rem;
            font-weight: bold;
            color: var(--accent-color);
            margin: 10px 0;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }
        .summary-grid div { background: #2a2a2a; padding: 10px; border-radius: 6px; }
        .summary-grid strong { color: #aaa; display: block; font-size: 0.9rem; }

        /* Pantalla de Historial */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #444;
        }
        th { background-color: #2a2a2a; color: var(--accent-color); }
        tr:hover { background-color: #2a2a2a; }
        
        .row-controls { display: flex; gap: 10px; }
    </style>
</head>
<body>

    <div id="setup-screen" class="screen panel">
        <h1>Configuración de Tueste</h1>
        
        <div class="form-group">
            <label for="tostador">Tostador:</label>
            <input type="text" id="tostador" placeholder="Nombre (Ej. Yo, Mi hijo...)" required>
        </div>

        <div class="form-group">
            <label for="variedad">Variedad:</label>
            <select id="variedad">
                <option value="Sidra Honey">Sidra Honey</option>
                <option value="Sidra Lavado">Sidra Lavado</option>
                <option value="Typica Lavado">Typica Lavado</option>
                <option value="Blend">Blend</option>
            </select>
        </div>

        <div class="form-group">
            <label for="perfil">Perfil:</label>
            <select id="perfil">
                <option value="Predeterminado">Predeterminado</option>
                <option value="Genérico">Genérico</option>
            </select>
        </div>

        <div class="form-group">
            <label for="secuencia">Secuencia (Min:Seg | Temp):</label>
            <textarea id="secuencia">
0:00 | 32°C
0:30 | 95°C
1:00 | 105°C
1:30 | 114°C
2:00 | 122°C
2:30 | 130°C
3:00 | 138°C
3:30 | 145°C
4:00 | 151°C
4:30 | 156°C
5:00 | 161°C
5:30 | 167°C
6:00 | 173°C
6:30 | 178°C
7:00 | 184°C
7:30 | 189°C
8:00 | 193°C
8:30 | 196°C
8:45 | 197°C 
9:00 | 199°C 
9:30 | 202°C 
10:00 | 205°C</textarea>
        </div>

        <button id="btn-start" class="btn-primary">Iniciar Tueste</button>
        
        <div class="row-controls">
            <button id="btn-view-history" class="btn-secondary">Ver Historial</button>
            <button id="btn-trigger-load" class="btn-info">Cargar JSON</button>
            <input type="file" id="file-loader" accept=".json" style="display: none;">
        </div>
    </div>

    <div id="roast-screen" class="screen">
        <div class="status-container">
            <div class="status-box" id="box-actual">
                <div class="box-title">Actual</div>
                <div class="box-data">
                    <span id="actual-time">00:00</span>
                    <span id="actual-temp">--°C</span>
                </div>
            </div>

            <div class="status-box" id="box-next">
                <div class="box-title">Siguiente Hito</div>
                <div class="box-data">
                    <span id="next-time">--:--</span>
                    <span id="next-temp">--°C</span>
                </div>
            </div>
        </div>

        <div class="action-controls">
            <button id="btn-hito" class="btn-primary">Hito OK</button>
            <button id="btn-stop" class="btn-danger">Terminar</button>
        </div>

        <canvas id="live-chart"></canvas>
    </div>

    <div id="result-screen" class="screen panel">
        <div class="result-header">
            <h2>Análisis del Tueste</h2>
            <div class="score-display" id="final-score">0%</div>
            <p>Precisión del Perfil</p>
        </div>

        <div class="summary-grid">
            <div><strong>Fecha:</strong> <span id="res-fecha"></span></div>
            <div><strong>Tostador:</strong> <span id="res-tostador"></span></div>
            <div><strong>Variedad:</strong> <span id="res-variedad"></span></div>
            <div><strong>Perfil:</strong> <span id="res-perfil"></span></div>
        </div>

        <canvas id="result-chart"></canvas>

        <div style="margin-top: 20px;">
            <button id="btn-download-json" class="btn-primary">Descargar JSON</button>
            <button id="btn-back-home" class="btn-secondary">Volver al Inicio</button>
        </div>
    </div>

    <div id="history-screen" class="screen panel">
        <h2>Historial de Tuestes</h2>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Tostador</th>
                        <th>Variedad</th>
                        <th>Score</th>
                    </tr>
                </thead>
                <tbody id="history-body">
                    </tbody>
            </table>
        </div>
        <button id="btn-history-back" class="btn-secondary">Volver al Inicio</button>
    </div>

    <script>
        // --- VARIABLES GLOBALES ---
        let timerInterval;
        let startTime;
        let sequenceData = [];
        let actualData = [];
        let expectedHitoIndex = 1; 
        let wakeLock = null;
        let currentRoastScore = 0;
        let currentRoastExportData = null; // Para guardar en JSON o Historial

        // Elementos DOM
        const screens = {
            setup: document.getElementById('setup-screen'),
            roast: document.getElementById('roast-screen'),
            result: document.getElementById('result-screen'),
            history: document.getElementById('history-screen')
        };

        const liveCanvas = document.getElementById('live-chart');
        const liveCtx = liveCanvas.getContext('2d');
        const resultCanvas = document.getElementById('result-chart');
        const resultCtx = resultCanvas.getContext('2d');

        // --- FUNCIONES DE UTILIDAD ---
        function showScreen(screenName) {
            Object.values(screens).forEach(s => s.style.display = 'none');
            screens[screenName].style.display = 'block';
        }

        async function activarMantenerPantalla() {
            if ('wakeLock' in navigator) {
                try { wakeLock = await navigator.wakeLock.request('screen'); } 
                catch (err) { console.error(err); }
            }
        }

        function desactivarMantenerPantalla() {
            if (wakeLock !== null) { wakeLock.release().then(() => { wakeLock = null; }); }
        }

        function formatTime(totalSeconds) {
            let m = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
            let s = (totalSeconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function parseSequence(text) {
            const lines = text.trim().split('\n');
            const data = [];
            for (let line of lines) {
                if (!line.includes('|')) continue;
                let parts = line.split('|');
                let timeParts = parts[0].trim().split(':');
                if (timeParts.length === 2) {
                    let totalSeconds = (parseInt(timeParts[0]) * 60) + parseInt(timeParts[1]);
                    let tempValue = parseFloat(parts[1].replace(/[^0-9.]/g, ''));
                    data.push({ seconds: totalSeconds, timeLabel: parts[0].trim(), tempValue: tempValue });
                }
            }
            return data.sort((a, b) => a.seconds - b.seconds);
        }

        // --- CÁLCULO DE SCORE ---
        function calculateScore(targetSec, realSec) {
            // Límite de 10 segundos. 0 error = 100%. 10 error = 0%.
            let error = Math.abs(targetSec - realSec);
            if (error >= 10) return 0;
            return 100 - (error * 10); // Pierde 10% por cada segundo de error
        }

        function generateFinalScore() {
            if (actualData.length <= 1) return 0; // Solo tiene el punto de inicio
            
            let totalPoints = 0;
            let totalHitos = 0;

            // Comparamos desde el índice 1 en adelante
            for (let i = 1; i < actualData.length; i++) {
                if (i < sequenceData.length) {
                    let expectedSec = sequenceData[i].seconds;
                    let realSec = actualData[i].seconds;
                    totalPoints += calculateScore(expectedSec, realSec);
                    totalHitos++;
                }
            }
            return totalHitos > 0 ? Math.round(totalPoints / totalHitos) : 0;
        }

        // --- GRÁFICOS ---
        function drawChart(canvas, ctx, seqData, actData, showAxes = false) {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = showAxes ? 300 : 250;

            const paddingX = showAxes ? 40 : 15;
            const paddingY = showAxes ? 30 : 15;
            const width = canvas.width;
            const height = canvas.height;

            ctx.clearRect(0, 0, width, height);
            if (seqData.length === 0) return;

            const maxSec = seqData[seqData.length - 1].seconds;
            const minTemp = seqData[0].tempValue;
            const maxTemp = seqData[seqData.length - 1].tempValue;

            const getX = (sec) => paddingX + (sec / maxSec) * (width - paddingX - 15);
            const getY = (temp) => height - paddingY - ((temp - minTemp) / (maxTemp - minTemp)) * (height - paddingY - 20);

            // Dibujar Ejes si se solicita (Pantalla de Resultados)
            if (showAxes) {
                ctx.beginPath();
                ctx.strokeStyle = '#666';
                ctx.lineWidth = 1;
                // Eje Y
                ctx.moveTo(paddingX, 20);
                ctx.lineTo(paddingX, height - paddingY);
                // Eje X
                ctx.lineTo(width - 15, height - paddingY);
                ctx.stroke();

                ctx.fillStyle = '#aaa';
                ctx.font = '12px sans-serif';
                ctx.textAlign = 'right';
                // Etiquetas Y
                ctx.fillText(maxTemp + "°", paddingX - 5, 25);
                ctx.fillText(minTemp + "°", paddingX - 5, height - paddingY);
                
                ctx.textAlign = 'center';
                // Etiquetas X (Cada 2 minutos aprox)
                ctx.fillText("0:00", paddingX, height - paddingY + 15);
                ctx.fillText(formatTime(maxSec), width - 15, height - paddingY + 15);
            }

            // Curva Teórica (Punteada Gris)
            ctx.beginPath();
            ctx.strokeStyle = '#777';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            seqData.forEach((pt, i) => {
                if (i === 0) ctx.moveTo(getX(pt.seconds), getY(pt.tempValue));
                else ctx.lineTo(getX(pt.seconds), getY(pt.tempValue));
            });
            ctx.stroke();
            ctx.setLineDash([]); 

            // Curva Real (Naranja Gruesa)
            if (actData.length > 0) {
                ctx.beginPath();
                ctx.strokeStyle = '#ff9800';
                ctx.lineWidth = 3;
                actData.forEach((pt, i) => {
                    if (i === 0) ctx.moveTo(getX(pt.seconds), getY(pt.tempValue));
                    else ctx.lineTo(getX(pt.seconds), getY(pt.tempValue));
                });
                ctx.stroke();
                
                // Puntos
                ctx.fillStyle = '#ffffff';
                actData.forEach(pt => {
                    ctx.beginPath();
                    ctx.arc(getX(pt.seconds), getY(pt.tempValue), 4, 0, Math.PI * 2);
                    ctx.fill();
                });
            }
        }

        // --- LÓGICA DE TUESTE EN TIEMPO REAL ---
        function updateDisplay() {
            let now = Date.now();
            let elapsedSeconds = Math.floor((now - startTime) / 1000);
            
            document.getElementById('actual-time').textContent = formatTime(elapsedSeconds);

            let currentIndex = 0;
            for (let i = 0; i < sequenceData.length; i++) {
                if (elapsedSeconds >= sequenceData[i].seconds) currentIndex = i;
                else break;
            }

            let nextTimeIndex = currentIndex + 1;
            if (nextTimeIndex < sequenceData.length) {
                let current = sequenceData[currentIndex];
                let next = sequenceData[nextTimeIndex];
                let progreso = Math.min((elapsedSeconds - current.seconds) / (next.seconds - current.seconds), 1);
                let tempInterpolada = current.tempValue + ((next.tempValue - current.tempValue) * progreso);
                document.getElementById('actual-temp').textContent = Math.round(tempInterpolada) + "°C";
            } else {
                document.getElementById('actual-temp').textContent = sequenceData[sequenceData.length - 1].tempValue + "°C";
            }

            if (expectedHitoIndex < sequenceData.length) {
                document.getElementById('next-time').textContent = sequenceData[expectedHitoIndex].timeLabel;
                document.getElementById('next-temp').textContent = sequenceData[expectedHitoIndex].tempValue + "°C";
            } else {
                document.getElementById('next-time').textContent = "FIN";
                document.getElementById('next-temp').textContent = "---";
                document.getElementById('btn-hito').disabled = true;
            }
        }

        // Iniciar
        document.getElementById('btn-start').addEventListener('click', async () => {
            const tostador = document.getElementById('tostador').value.trim() || "Anónimo";
            sequenceData = parseSequence(document.getElementById('secuencia').value);
            
            if (sequenceData.length === 0) return alert("Verifica el formato de la secuencia.");

            showScreen('roast');
            document.getElementById('btn-hito').disabled = false;
            await activarMantenerPantalla();

            startTime = Date.now();
            expectedHitoIndex = 1; 
            
            actualData = [{ timeLabel: "0:00", seconds: 0, tempValue: sequenceData[0].tempValue }];
            
            setTimeout(() => drawChart(liveCanvas, liveCtx, sequenceData, actualData, false), 100); 
            updateDisplay();
            timerInterval = setInterval(updateDisplay, 1000);
        });

        // Marcar Hito
        document.getElementById('btn-hito').addEventListener('click', () => {
            if (expectedHitoIndex < sequenceData.length) {
                let elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);
                actualData.push({
                    timeLabel: formatTime(elapsedSeconds),
                    seconds: elapsedSeconds,
                    tempValue: sequenceData[expectedHitoIndex].tempValue
                });
                expectedHitoIndex++;
                drawChart(liveCanvas, liveCtx, sequenceData, actualData, false);
                updateDisplay();
            }
        });

        // Terminar Tueste y Generar Resultados
        document.getElementById('btn-stop').addEventListener('click', () => {
            clearInterval(timerInterval);
            desactivarMantenerPantalla();
            
            const tostador = document.getElementById('tostador').value.trim() || "Anónimo";
            const variedad = document.getElementById('variedad').value;
            const perfil = document.getElementById('perfil').value;
            const fecha = new Date().toLocaleString();
            
            currentRoastScore = generateFinalScore();

            // Preparar objeto JSON final
            currentRoastExportData = {
                fecha: fecha,
                tostador: tostador,
                variedad: variedad,
                perfil: perfil,
                score: currentRoastScore,
                secuencia_teorica: sequenceData,
                puntos_reales: actualData
            };

            // Guardar en Historial (Local Storage)
            let historial = JSON.parse(localStorage.getItem('vinzaHistorial')) || [];
            historial.push({
                fecha: fecha,
                tostador: tostador,
                variedad: variedad,
                score: currentRoastScore
            });
            localStorage.setItem('vinzaHistorial', JSON.stringify(historial));

            mostrarPantallaResultados(currentRoastExportData);
        });

        // --- PANTALLA DE RESULTADOS ---
        function mostrarPantallaResultados(dataObj) {
            document.getElementById('res-fecha').textContent = dataObj.fecha;
            document.getElementById('res-tostador').textContent = dataObj.tostador;
            document.getElementById('res-variedad').textContent = dataObj.variedad;
            document.getElementById('res-perfil').textContent = dataObj.perfil;
            
            const scoreEl = document.getElementById('final-score');
            scoreEl.textContent = dataObj.score + "%";
            // Color según calificación
            if(dataObj.score >= 90) scoreEl.style.color = "var(--success-color)";
            else if(dataObj.score >= 70) scoreEl.style.color = "var(--accent-color)";
            else scoreEl.style.color = "var(--danger-color)";

            showScreen('result');
            
            // Dibujar gráfico con ejes
            setTimeout(() => drawChart(resultCanvas, resultCtx, dataObj.secuencia_teorica, dataObj.puntos_reales, true), 100);
        }

        // Descargar JSON
        document.getElementById('btn-download-json').addEventListener('click', () => {
            if (!currentRoastExportData) return;
            const dataStr = JSON.stringify(currentRoastExportData, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            let nomArchivo = `Tueste_${currentRoastExportData.variedad.replace(/\s+/g, '')}_${currentRoastExportData.score}pct.json`;
            a.download = nomArchivo;
            a.click();
            URL.revokeObjectURL(url);
        });

        // --- HISTORIAL ---
        document.getElementById('btn-view-history').addEventListener('click', () => {
            const tbody = document.getElementById('history-body');
            tbody.innerHTML = '';
            
            let historial = JSON.parse(localStorage.getItem('vinzaHistorial')) || [];
            if (historial.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">No hay tuestes registrados aún.</td></tr>';
            } else {
                // Invertir para ver el más reciente primero
                historial.slice().reverse().forEach(t => {
                    let tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${t.fecha.split(',')[0]}</td>
                        <td>${t.tostador}</td>
                        <td>${t.variedad}</td>
                        <td><strong>${t.score}%</strong></td>
                    `;
                    tbody.appendChild(tr);
                });
            }
            showScreen('history');
        });

        // --- CARGAR JSON ---
        document.getElementById('btn-trigger-load').addEventListener('click', () => {
            document.getElementById('file-loader').click();
        });

        document.getElementById('file-loader').addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const loadedData = JSON.parse(e.target.result);
                    currentRoastExportData = loadedData;
                    mostrarPantallaResultados(loadedData);
                } catch (error) {
                    alert("Error al leer el archivo JSON. Asegúrate de que sea un archivo de tueste válido.");
                }
            };
            reader.readAsText(file);
            event.target.value = ''; // Resetear input
        });

        // Botones de retorno
        document.getElementById('btn-back-home').addEventListener('click', () => showScreen('setup'));
        document.getElementById('btn-history-back').addEventListener('click', () => showScreen('setup'));

        // Redibujar gráfico al rotar pantalla
        window.addEventListener('resize', () => {
            if (screens.roast.style.display === 'block') drawChart(liveCanvas, liveCtx, sequenceData, actualData, false);
            if (screens.result.style.display === 'block') drawChart(resultCanvas, resultCtx, currentRoastExportData.secuencia_teorica, currentRoastExportData.puntos_reales, true);
        });
    </script>
</body>
</html>
