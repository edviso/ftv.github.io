<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análisis de Tueste y Cata con IA</title>
    <style>
        :root {
            --bg-color: #121212;
            --surface: #1e1e1e;
            --primary: #00bcd4; /* Cambiado a un tono celeste vibrante */
            --secondary: #03dac6;
            --accent: #cf6679;
            --text: #e0e0e0;
            --border: #333;
            --error: #cf6679;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .card {
            background: var(--surface);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }
        h1, h2 {
            margin-top: 0;
            color: var(--primary);
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        input[type="password"], textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background-color: var(--bg-color);
            color: var(--text);
            box-sizing: border-box;
            font-family: inherit;
        }
        textarea {
            resize: vertical;
            min-height: 120px;
        }
        button {
            background-color: var(--primary);
            color: #000;
            border: none;
            padding: 14px 20px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.2s;
            margin-bottom: 10px;
        }
        button:active {
            opacity: 0.8;
        }
        button:disabled {
            background-color: #555;
            color: #888;
            cursor: not-allowed;
        }
        .btn-row {
            display: flex;
            gap: 10px;
        }
        .btn-row button {
            flex: 1;
        }
        #btnCopiar {
            background-color: var(--secondary);
            margin-top: 15px;
            display: none;
        }
        #btnExportar {
            background-color: var(--primary);
            color: #000;
        }
        #btnImportarLabel {
            background-color: #ff9800;
            color: #000;
            display: block;
            text-align: center;
            padding: 14px 20px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        input[type="file"] {
            display: none;
        }
        #app-section, #loading-section, #error-message {
            display: none;
        }
        #error-message {
            color: var(--error);
            margin-top: 10px;
        }
        .result-box {
            background-color: var(--bg-color);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
            white-space: pre-wrap;
            font-size: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    
    <div id="auth-section" class="card">
        <h1>Configuración de IA</h1>
        <p>Ingresa tu API Key de Google Gemini.</p>
        <label for="apiKey">API Key de Gemini:</label>
        <input type="password" id="apiKey" placeholder="AQ... o AIzaSy...">
        <button onclick="iniciarApp()">Iniciar Aplicación</button>
        <div id="error-message"></div>
    </div>

    <div id="app-section">
        <div class="card">
            <h2>Datos del Tueste y la Cata</h2>
            
            <label for="datosTueste">Curva de Tueste (Tabla de Temperaturas y Tiempos):</label>
            <textarea id="datosTueste">Temp (°C)	Teórico	Real	Diferencia (s)	Fase	RoR
88	0:30	00:25	-5	S	-
105	1:00	00:53	-7	S	36
114	1:30	01:15	-15	S	35
122	2:00	01:47	-13	S	31
130	2:30	02:18	-12	S	27
138	3:00	02:56	-4	S	24
145	3:30	03:35	5	S	21
151	4:00	04:00	0	S	19
156	4:30	04:27	-3	M	17
161	5:00	04:58	-2	M	15
167	5:30	05:35	5	M	14
173	6:00	06:10	10	M	13
178	6:30	06:38	8	M	12
184	7:00	06:57	-3	M	13
189	7:30	07:24	-6	M	13
193	8:00	07:52	-8	M	12
196	8:30	08:27	-3	M	11
197	8:45	08:47	2	1	9
199	9:00	08:56	-4	1	9
202	9:30	09:19	-11	D	9
203	10:00	09:46	-14	D	8
204	10:30	09:59	-31	D	7
205	11:00	10:31	-29	D	6</textarea>

            <label for="metadatosTueste">Datos Generales del Tueste:</label>
            <textarea id="metadatosTueste">Tipo de máquina: Canguilera adaptada con dimmer
Lote: BLE-L01-06JUL-T03
Variedad: Blend
Proceso: Natural
Fecha de tueste: 06/07/2026
Nivel de tueste: City (más claro)
Luminosidad (L): 68.3
Temperatura de tueste: 211 °C
Tiempo total: 12:00
DTR: 12.5%
Merma: 12.6%</textarea>

            <label for="datosCata">Datos de Extracción (Cata):</label>
            <textarea id="datosCata">Fecha de cata: 20/07/2026
Reposo: 14 días
Método: Híbrido
Dispositivo: AeroPress
Filtro: Metálico
Molienda: 35
Café: 12.5 g
Agua: 200 ml
Ratio: 1:16
Temperatura del agua: 88 °C
Vertidos: Blooming 38 ml + vertido único hasta 200 ml</textarea>

            <label for="puntuaciones">Puntuaciones y Notas Aromáticas:</label>
            <textarea id="puntuaciones">Puntuaciones:
Fragancia: 5
Aroma: 3
Sabor: 4
Acidez: 4
Dulzor: 4
Amargor: 2
Cuerpo: 4
Balance: 4
Retrogusto: 5
Limpieza de taza: 3
Uniformidad: 4
Volver a tomar: 5

Notas aromáticas:
Floral: 3
Frutal: 3
Caramelo: 3
Especiado: 2
Tostado: 1
Herbal: 1</textarea>

            <button id="btnAnalizar" onclick="solicitarAnalisis()">Generar Análisis y Recomendación</button>
            
            <div class="btn-row" style="margin-top: 15px;">
                <button id="btnExportar" onclick="exportarJSON()">Exportar Datos & IA (JSON)</button>
                <label id="btnImportarLabel" for="inputJSON">Importar JSON</label>
                <input type="file" id="inputJSON" accept=".json,.txt" onchange="importarJSON(event)">
            </div>
        </div>

        <div id="loading-section" class="card" style="text-align: center;">
            <p>⏳ Analizando los datos de tueste y extracción...</p>
        </div>

        <div id="resultado-section" class="card" style="display: none;">
            <h2>Análisis de la IA</h2>
            <div id="resultado-texto" class="result-box"></div>
            <button id="btnCopiar" onclick="copiarCurvaFormateada()">Copiar Curva Sugerida</button>
        </div>
    </div>

</div>

<script>
    let GEMINI_API_KEY = "";
    let textoCurvaExtraido = "";
    let ultimoAnalisisHTML = "";
    let ultimoAnalisisBruto = "";

    function iniciarApp() {
        const keyInput = document.getElementById('apiKey').value.trim();
        const errorDiv = document.getElementById('error-message');
        
        if (keyInput.length < 20) {
            errorDiv.innerText = "Por favor, ingresa una API Key válida.";
            errorDiv.style.display = "block";
            return;
        }

        GEMINI_API_KEY = keyInput;
        document.getElementById('auth-section').style.display = 'none';
        document.getElementById('app-section').style.display = 'block';
    }

    async function solicitarAnalisis() {
        const btn = document.getElementById('btnAnalizar');
        const loading = document.getElementById('loading-section');
        const resultadoSection = document.getElementById('resultado-section');
        const resultadoTexto = document.getElementById('resultado-texto');
        const btnCopiar = document.getElementById('btnCopiar');

        const tueste = document.getElementById('datosTueste').value;
        const metadatos = document.getElementById('metadatosTueste').value;
        const cata = document.getElementById('datosCata').value;
        const puntuaciones = document.getElementById('puntuaciones').value;

        const prompt = `Actúa como un maestro tostador de café y catador experto (Q Grader). 
Analiza los siguientes datos de un lote de café. TEN MUY EN CUENTA que la máquina de tueste es una "canguilera (popcorn popper) adaptada con dimmer". Los controles térmicos se hacen modificando el voltaje (potencia) y NO usando válvulas de gas o variando la velocidad de un tambor.

DATOS DE LA CURVA:
${tueste}

METADATOS DEL TUESTE:
${metadatos}

DATOS DE EXTRACCIÓN/CATA:
${cata}

PUNTUACIONES SENSORIALES:
${puntuaciones}

Por favor, estructura tu respuesta de la siguiente manera:
1. Análisis del Tueste: (Evalúa el RoR, el DTR, el tiempo total vs la merma, y las diferencias entre tiempo teórico y real).
2. Relación Tueste-Taza: (Explica por qué obtuvo esos puntajes de amargor, limpieza y aroma).
3. Recomendación de Nueva Curva: (Calcula libremente el tiempo final óptimo. Luego, proyecta la nueva curva con temperaturas objetivo ESTRICTAMENTE en intervalos de 30 segundos: 0:30, 1:00, 1:30, 2:00... hasta llegar al tiempo final que calculaste). Propón acciones técnicas basadas en cambios de potencia/voltaje.

MUY IMPORTANTE: Al final absoluto de tu respuesta, debes escribir la tabla de la nueva curva sugerida utilizando EXCLUSIVAMENTE este formato y encerrándola entre las etiquetas [INICIO_CURVA] y [FIN_CURVA]:

[INICIO_CURVA]
0:00 | 32°C | C
0:30 | 88°C | S
1:00 | 105°C | S
...
[FIN_CURVA]`;

        btn.disabled = true;
        btnCopiar.style.display = 'none';
        loading.style.display = 'block';
        resultadoSection.style.display = 'none';
        resultadoTexto.innerHTML = "";
        textoCurvaExtraido = "";
        ultimoAnalisisHTML = "";
        ultimoAnalisisBruto = "";

        try {
            const respuesta = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=${GEMINI_API_KEY}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-goog-api-key': GEMINI_API_KEY 
                },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: prompt }]
                    }],
                    generationConfig: {
                        temperature: 0.7
                    }
                })
            });

            if (!respuesta.ok) {
                let mensajeReal = "Error desconocido de conexión";
                try {
                    const errorData = await respuesta.json();
                    if (errorData.error && errorData.error.message) {
                        mensajeReal = errorData.error.message;
                    } else {
                        mensajeReal = JSON.stringify(errorData);
                    }
                } catch(e) {
                    mensajeReal = respuesta.statusText || "No se pudo leer el error de Google.";
                }
                throw new Error(mensajeReal);
            }

            const datos = await respuesta.json();
            let textoGenerado = datos.candidates[0].content.parts[0].text;
            
            ultimoAnalisisBruto = textoGenerado;

            const regex = /\[INICIO_CURVA\]([\s\S]*?)\[FIN_CURVA\]/;
            const match = textoGenerado.match(regex);
            
            if (match) {
                textoCurvaExtraido = match[1].trim();
                textoGenerado = textoGenerado.replace(regex, '');
                btnCopiar.style.display = 'block';
            }
            
            ultimoAnalisisHTML = textoGenerado.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
            resultadoTexto.innerHTML = ultimoAnalisisHTML;
            resultadoSection.style.display = 'block';
            
        } catch (error) {
            resultadoTexto.innerHTML = `<span style="color: var(--error)"><b>Error:</b><br>${error.message}</span>`;
            resultadoSection.style.display = 'block';
        } finally {
            btn.disabled = false;
            loading.style.display = 'none';
            resultadoSection.scrollIntoView({ behavior: 'smooth' });
        }
    }

    function copiarCurvaFormateada() {
        if (!textoCurvaExtraido) return;
        
        navigator.clipboard.writeText(textoCurvaExtraido).then(() => {
            const btn = document.getElementById('btnCopiar');
            const originalText = btn.innerText;
            btn.innerText = "¡Curva Copiada con Éxito!";
            btn.style.backgroundColor = "#4caf50";
            
            setTimeout(() => { 
                btn.innerText = originalText; 
                btn.style.backgroundColor = "var(--secondary)";
            }, 2500);
        }).catch(err => {
            alert("Tu navegador no permitió copiar automáticamente. Error: " + err);
        });
    }

    function exportarJSON() {
        const datosSesion = {
            version: "1.0",
            fechaExportacion: new Date().toISOString(),
            entrada: {
                curvaTueste: document.getElementById('datosTueste').value,
                metadatosTueste: document.getElementById('metadatosTueste').value,
                datosCata: document.getElementById('datosCata').value,
                puntuaciones: document.getElementById('puntuaciones').value
            },
            salidaIA: {
                analisisTextoBruto: ultimoAnalisisBruto,
                curvaSugeridaFormateada: textoCurvaExtraido
            }
        };

        // Forzar tipo application/json para que Android reconozca el archivo nativamente
        const blob = new Blob([JSON.stringify(datosSesion, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const downloadAnchor = document.createElement('a');
        downloadAnchor.href = url;
        
        let nombreLote = "sesion_tueste";
        try {
            const metaLines = document.getElementById('metadatosTueste').value.split('
');
            const loteLine = metaLines.find(l => l.toLowerCase().includes('lote:'));
            if (loteLine) {
                nombreLote = loteLine.split(':')[1].trim().replace(/\s+/g, '_');
            }
        } catch(e) {}

        downloadAnchor.download = `${nombreLote}_respaldo.json`;
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
        URL.revokeObjectURL(url);
    }

    function importarJSON(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const contenido = JSON.parse(e.target.result);
                
                if (contenido.entrada) {
                    if (contenido.entrada.curvaTueste) document.getElementById('datosTueste').value = contenido.entrada.curvaTueste;
                    if (contenido.entrada.metadatosTueste) document.getElementById('metadatosTueste').value = contenido.entrada.metadatosTueste;
                    if (contenido.entrada.datosCata) document.getElementById('datosCata').value = contenido.entrada.datosCata;
                    if (contenido.entrada.puntuaciones) document.getElementById('puntuaciones').value = contenido.entrada.puntuaciones;
                }

                if (contenido.salidaIA) {
                    ultimoAnalisisBruto = contenido.salidaIA.analisisTextoBruto || "";
                    textoCurvaExtraido = contenido.salidaIA.curvaSugeridaFormateada || "";
                    
                    if (ultimoAnalisisBruto) {
                        const regex = /\[INICIO_CURVA\]([\s\S]*?)\[FIN_CURVA\]/;
                        let textoLimpio = ultimoAnalisisBruto.replace(regex, '');
                        ultimoAnalisisHTML = textoLimpio.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
                        
                        document.getElementById('resultado-texto').innerHTML = ultimoAnalisisHTML;
                        document.getElementById('resultado-section').style.display = 'block';
                        
                        if (textoCurvaExtraido) {
                            document.getElementById('btnCopiar').style.display = 'block';
                        }
                    }
                }

                alert("¡Datos importados con éxito!");
            } catch (err) {
                alert("El archivo JSON no tiene un formato válido. Error: " + err.message);
            }
            event.target.value = '';
        };
        reader.readAsText(file);
    }
</script>
</body>
</html>
